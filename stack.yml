version: '3.8'

services:
  mi-web:
    image: ghcr.io/esteven2003/mi-web:latest
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.miweb.entrypoints=http"

        # 🌐 DOMINIO (cámbialo por el tuyo)
        - "traefik.http.routers.miweb.rule=Host(`miweb.byronrm.com`)"

        - "traefik.http.middlewares.miweb-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.miweb.middlewares=miweb-https-redirect"

        - "traefik.http.routers.miweb-secure.entrypoints=https"
        - "traefik.http.routers.miweb-secure.rule=Host(`miweb.byronrm.com`)"
        - "traefik.http.routers.miweb-secure.tls=true"
        - "traefik.http.routers.miweb-secure.tls.certresolver=http"
        - "traefik.http.routers.miweb-secure.service=miweb"

        # 🔌 Puerto interno de nginx
        - "traefik.http.services.miweb.loadbalancer.server.port=80"

        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true